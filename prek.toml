# Configuration file for `prek`, a git hook framework written in Rust.
# See https://prek.j178.dev for more information.
#:schema https://www.schemastore.org/prek.json
#
# Hooks run against the staged change being committed (prek's default
# scope), so swift-format's in-place rewrites only touch the files in
# the commit - never the whole tree or a branch diff.

default_install_hook_types = ["pre-commit", "commit-msg"]

[[repos]]
repo = "https://github.com/GoodHatsLLC/no-ai-coauthors"
rev = "1.0.0"
hooks = [
  { id = "no-ai-coauthors" },
]

[[repos]]
repo = "local"
hooks = [
  {
    id = "swift-format",
    name = "run swift-format format",
    entry = "swift format format -i --configuration .swift-format.json",
    language = "system",
    files = '.*\.swift$',
    exclude = '(^|/)Vendor/',
    pass_filenames = true
  },
  {
    id = "structured-concurrency-escape-hatches",
    name = "forbid unchecked concurrency and @safe escape hatches",
    entry = "./Scripts/check_concurrency_safety_policies.sh",
    language = "system",
    files = '.*\.swift$',
    pass_filenames = false
  },
  {
    id = "main-thread-usage",
    name = "forbid bare Thread.isMainThread without thread-ismain-ok justification",
    entry = "./Scripts/check_main_thread_usage.sh",
    language = "system",
    files = '.*\.swift$|^Scripts/check_main_thread_usage\.sh$',
    pass_filenames = false
  },
]
